services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chicken_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - appnet

  api:
    build: ./01_api
    ports:
      - "3001:3001"
    depends_on:
      - mysql
    networks:
      - appnet

  frontend:
    build: ./02_frontend
    environment:
      NEXT_PUBLIC_API_HOST: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - appnet

networks:
  appnet:

volumes:
  mysql_data: